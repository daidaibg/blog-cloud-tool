<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>区域填充涂色工具（响应式版）</title>
<style>
:root{
  --bg:#f5f7fb;
  --panel:#ffffff;
  --line:#e5e7eb;
  --text:#111827;
  --sub:#6b7280;
  --primary:#2563eb;
  --primary-dark:#1d4ed8;
  --danger:#ef4444;
  --shadow:0 8px 24px rgba(0,0,0,.08);
  --radius:16px;
}
*{box-sizing:border-box}
html,body{
  margin:0;
  min-height:100%;
  font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--text);
}
body{overflow:hidden;}
button,input{font:inherit}
.app{
  display:flex;
  min-height:100vh;
  height:100vh;
  min-height:100svh;
  height:100svh;
  overflow:hidden;
}
.sidebar{
  width:320px;
  padding:16px;
  border-right:1px solid var(--line);
  background:#f8fafc;
  overflow:auto;
  flex:none;
}
.panel{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:16px;
  margin-bottom:14px;
}
h3,h4{margin:0 0 12px;}
.desc{
  font-size:13px;
  color:var(--sub);
  line-height:1.6;
  margin-bottom:12px;
}
.row{
  display:flex;
  gap:8px;
  margin-bottom:10px;
  flex-wrap:wrap;
}
.settings-grid{
  display:grid;
  gap:10px;
}
.settings-group{
  padding:10px;
  border:1px solid #e5e7eb;
  border-radius:14px;
  background:linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
}
.settings-group-title{
  font-size:12px;
  font-weight:700;
  color:#64748b;
  letter-spacing:.04em;
  margin:0 0 8px;
}
.settings-actions{
  display:grid;
  grid-template-columns:repeat(2, minmax(0, 1fr));
  gap:8px;
}
.settings-actions.triple{
  grid-template-columns:repeat(3, minmax(0, 1fr));
}
button{
  border:none;
  border-radius:12px;
  padding:10px 14px;
  cursor:pointer;
  font-size:14px;
  font-weight:600;
  transition:.2s;
}
button:hover{transform:translateY(-1px);}
button:disabled{
  opacity:.45;
  cursor:not-allowed;
  transform:none;
}
.btn{background:#eef2ff;color:#1e3a8a;}
.btn-primary{background:var(--primary);color:#fff;}
.btn-primary:hover{background:var(--primary-dark);}
.btn-danger{background:#fee2e2;color:#b91c1c;}
.btn-soft{background:#f8fafc;color:#334155;border:1px solid #e2e8f0;}
.btn-soft:hover{background:#f1f5f9;}
.mode-btn.active{background:#111827;color:#fff;}
input[type="text"],
input[type="range"]{
  width:100%;
  padding:10px 12px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  outline:none;
}
.color-picker-wrap{
  position:relative;
  width:78px;
  flex:none;
  height:42px;
}
.palette-inputs{
  display:flex;
  align-items:center;
  gap:8px;
}
.palette-name-input{
  flex:1;
  min-width:0;
}
.color-box{
  position:absolute;
  inset:0;
  border-radius:12px;
  border:2px solid #e5e7eb;
  cursor:pointer;
  overflow:hidden;
}
.color-box::after{
  content:'选择颜色';
  position:absolute;
  right:10px;
  top:50%;
  transform:translateY(-50%);
  font-size:12px;
  color:#fff;
  background:rgba(0,0,0,.35);
  padding:2px 6px;
  border-radius:6px;
  pointer-events:none;
}
#colorPicker{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  opacity:0;
  cursor:pointer;
  border:none;
  padding:0;
}
.canvas-wrap{
  flex:1;
  position:relative;
  background:#fff;
  min-width:0;
  min-height:0;
  overflow:hidden;
}
canvas{
  width:100%;
  height:100%;
  display:block;
  cursor:grab;
  background:#ffffff;
  touch-action:none;
  user-select:none;
}
canvas.dragging{cursor:grabbing;}
canvas.editing{cursor:crosshair;}
.toolbar{
  position:absolute;
  right:12px;
  bottom:12px;
  z-index:12;
  background:rgba(255,255,255,.96);
  border:1px solid #e5e7eb;
  border-radius:12px;
  padding:10px 12px;
  box-shadow:var(--shadow);
  color:var(--sub);
  font-size:13px;
  user-select:none;
  max-width:min(440px, calc(100% - 24px));
  line-height:1.6;
}
.small{
  font-size:12px;
  color:var(--sub);
}
.stat{
  font-size:12px;
  color:var(--sub);
  line-height:1.7;
  padding:10px 12px;
  background:#f8fafc;
  border:1px dashed #d1d5db;
  border-radius:12px;
}
.saved-fill-list{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.saved-fill-empty{
  font-size:12px;
  color:var(--sub);
  padding:10px 12px;
  border:1px dashed #d1d5db;
  border-radius:12px;
  background:#f8fafc;
}
.saved-fill-item{
  display:grid;
  grid-template-columns:minmax(0, 1fr) auto;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  border:1px solid var(--line);
  border-radius:12px;
  background:#fff;
  cursor:pointer;
  transition:border-color .2s, box-shadow .2s, transform .2s;
}
.saved-fill-item:hover{
  border-color:#93c5fd;
  box-shadow:0 6px 18px rgba(37,99,235,.08);
}
.saved-fill-meta{
  min-width:0;
  flex:1;
}
.saved-fill-title{
  font-size:13px;
  font-weight:600;
  color:var(--text);
  margin-bottom:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.saved-fill-time{
  font-size:12px;
  color:var(--sub);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.saved-fill-actions{
  display:flex;
  gap:6px;
  flex:none;
  flex-wrap:nowrap;
}
.saved-fill-actions button{
  padding:8px 8px;
  font-size:12px;
  border-radius:10px;
  white-space:nowrap;
}
@media (max-width: 960px){
  body{overflow:auto;}
  .app{
    flex-direction:column;
    height:auto;
    min-height:100vh;
    min-height:100svh;
    overflow:visible;
  }
  .sidebar{
    width:100%;
    border-right:none;
    border-bottom:1px solid var(--line);
    padding:12px;
    overflow:visible;
  }
  .canvas-wrap{
    flex:none;
    min-height:360px;
    height:min(58svh, 560px);
  }
  .toolbar{
    right:10px;
    bottom:10px;
    max-width:calc(100% - 20px);
    padding:8px 10px;
    font-size:12px;
  }
}
@media (max-width: 640px){
  :root{--radius:14px;}
  .sidebar{padding:10px;}
  .panel{padding:14px;margin-bottom:10px;}
  .row button{
    flex:1 1 calc(50% - 4px);
    min-width:0;
    padding:10px 12px;
  }
  .settings-actions{
    grid-template-columns:1fr;
  }
  .settings-actions.triple{
    grid-template-columns:repeat(3, minmax(0, 1fr));
  }
  .palette-actions{
    display:grid;
    grid-template-columns:repeat(2, minmax(0, 1fr));
    gap:8px;
  }
  .palette-actions button{
    width:100%;
    min-width:0;
    margin:0;
  }
  #addColor{
    grid-column:1 / -1;
  }
  #exportBtn{
    grid-column:1 / -1;
  }
  .canvas-wrap{
    min-height:320px;
    height:min(52svh, 500px);
  }
  .toolbar{
    left:8px;
    right:8px;
    bottom:8px;
    border-radius:10px;
    max-width:none;
  }
  .saved-fill-item{
    align-items:flex-start;
    flex-direction:column;
  }
  .saved-fill-actions{
    width:100%;
  }
  .saved-fill-actions button{
    flex:1 1 0;
  }
}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar" id="sidebar">
    <div class="panel" id="settingsPanel">
      <h3>设置</h3>
      <div class="desc">
        浏览模式：拖拽查看。编辑模式：轻点填色，拖动平移，双指或滚轮缩放。
      </div>
      <div class="settings-grid">
        <div class="settings-group">
          <div class="settings-group-title">模式</div>
          <div class="settings-actions">
            <button id="editToggle" class="btn mode-btn">进入编辑</button>
          </div>
        </div>
        <div class="settings-group">
          <div class="settings-group-title">视图</div>
          <div class="settings-actions">
            <button id="fitBtn" class="btn btn-soft">适应画布</button>
            <button id="resetBtn" class="btn-danger">清空填色</button>
          </div>
        </div>
        <div class="settings-group">
          <div class="settings-group-title">操作</div>
          <div class="settings-actions triple">
            <button id="undoBtn" class="btn btn-soft">撤销</button>
            <button id="redoBtn" class="btn btn-soft">重做</button>
            <button id="saveFillBtn" class="btn-primary">保存</button>
          </div>
        </div>
      </div>
      <div class="desc">保存后会追加到列表，可随时恢复或删除。</div>
      <div id="savedFillList" class="saved-fill-list">
        <div class="saved-fill-empty">暂无保存记录</div>
      </div>
    </div>

    <div class="panel palette-panel" id="palettePanel">
      <h4>预设颜色</h4>
      <div class="desc">legend 将直接绘制在导出图里，和图表内容一起平移、缩放。</div>

      <div class="row palette-inputs" style="margin-top:12px;">
        <div class="color-picker-wrap">
          <div id="colorBox" class="color-box"></div>
          <input type="color" id="colorPicker" value="#ff4d4f">
        </div>
        <input id="nameInput" class="palette-name-input" type="text" placeholder="颜色名称">
      </div>

      <div class="row palette-actions">
        <button id="addColor" class="btn-primary">添加</button>
        <button id="rename" class="btn">重命名</button>
        <button id="delete" class="btn-danger">删除</button>
        <button id="exportBtn" class="btn">导出图片</button>
      </div>
    </div>

    <div class="panel" id="paramsPanel">
      <h4>区域识别参数</h4>
      <div class="desc">
        越暗越容易判定为边界。修改后点击“重新分区”生效。
      </div>
      <div class="row">
        <input type="range" id="boundaryThreshold" min="20" max="220" value="135">
      </div>
      <div class="small">当前边界阈值：<span id="thresholdText">135</span></div>

      <div class="desc" style="margin-top:12px;">
        透明阈值：alpha 小于此值时视为透明可填充区域。
      </div>
      <div class="row">
        <input type="range" id="alphaThreshold" min="0" max="255" value="8">
      </div>
      <div class="small">当前透明阈值：<span id="alphaText">8</span></div>

      <div class="row" style="margin-top:12px;">
        <button id="rebuildBtn" class="btn-primary">重新分区</button>
      </div>
    </div>

    <div class="panel" id="statusPanel">
      <h4>状态</h4>
      <div id="stats" class="stat">等待图片加载...</div>
    </div>
  </div>

  <div class="canvas-wrap" id="canvasWrap">
    <div class="toolbar" id="statusText">当前模式：浏览 / 拖拽查看 / 滚轮缩放</div>
    <canvas id="canvas"></canvas>
  </div>

  <div id="mobilePanelsAnchor" hidden></div>
</div>

<script>
const PALETTE_KEY = 'stable-coloring-palette-v6-responsive';
const FILL_DB_NAME = 'stable-coloring-fill-db';
const FILL_STORE_NAME = 'fills';
const HISTORY_LIMIT = 30;
const DRAG_THRESHOLD = 6;
const LEGEND_ITEM_HEIGHT = 36;
const LEGEND_GAP_X = 18;
const LEGEND_GAP_Y = 10;
const LEGEND_PADDING_X = 2;
const LEGEND_PADDING_Y = 4;
const LEGEND_TOP_GAP = 14;
const LEGEND_SIDE_GAP = 14;
const LEGEND_IMAGE_GAP = 14;
const LEGEND_FONT = '600 18px "PingFang SC","Microsoft YaHei",sans-serif';
const LEGEND_SWATCH_W = 28;
const LEGEND_SWATCH_H = 14;
const LEGEND_SWATCH_RADIUS = 4;
const LEGEND_TEXT_GAP = 10;

const canvas = document.getElementById('canvas');
const canvasWrap = document.getElementById('canvasWrap');
const ctx = canvas.getContext('2d');
const app = document.querySelector('.app');
const sidebar = document.getElementById('sidebar');
const settingsPanel = document.getElementById('settingsPanel');
const palettePanel = document.getElementById('palettePanel');
const paramsPanel = document.getElementById('paramsPanel');
const statusPanel = document.getElementById('statusPanel');
const mobilePanelsAnchor = document.getElementById('mobilePanelsAnchor');

const sourceCanvas = document.createElement('canvas');
const sourceCtx = sourceCanvas.getContext('2d', { willReadFrequently: true });

const fillCanvas = document.createElement('canvas');
const fillCtx = fillCanvas.getContext('2d', { willReadFrequently: true });

const img = new Image();
img.src = './G1.png';

let scale = 1;
let minScale = 0.1;
let maxScale = 20;
let offsetX = 0;
let offsetY = 0;
let viewportWidth = 0;
let viewportHeight = 0;
let deviceScale = Math.max(1, window.devicePixelRatio || 1);

let editing = false;

let pointerActive = false;
let pointerId = null;
let downClientX = 0;
let downClientY = 0;
let lastClientX = 0;
let lastClientY = 0;
let moved = false;
let isDragging = false;

let pinchActive = false;
let pinchDistance = 0;
let pinchMidpoint = null;
const activePointers = new Map();

let hoverRegionId = -1;
let hoverBounds = null;
let hoverOverlayCanvas = null;
let hoverOverlayRegionId = -1;

let sourceImageData = null;
let sourcePixels = null;

let regionMap = null;
let regions = [];

let undoStack = [];
let redoStack = [];
let fillDbPromise = null;
let savedFillRecords = [];

let hoverPending = false;
let hoverClientX = 0;
let hoverClientY = 0;

const loadedPalette = loadPalette();
let colors = loadedPalette?.colors || [
  { name:'红', value:'#ff4d4f' },
];
let selected = loadedPalette?.selected ?? 0;
selected = Math.max(0, Math.min(selected, colors.length - 1));

function measureTextWidth(text, font = LEGEND_FONT){
  ctx.save();
  ctx.setTransform(1,0,0,1,0,0);
  ctx.font = font;
  const width = ctx.measureText(text).width;
  ctx.restore();
  return width;
}

function getLegendItems(){
  return colors.map((c, i) => ({
    index: i,
    name: c.name,
    value: c.value,
    active: i === selected,
    width: Math.max(96, Math.ceil(measureTextWidth(c.name) + LEGEND_SWATCH_W + LEGEND_TEXT_GAP + 8))
  }));
}

function getLegendLayout(contentWidth = viewportWidth || canvas.width){
  const items = getLegendItems();
  const availableWidth = Math.max(120, contentWidth - LEGEND_SIDE_GAP * 2);
  let x = LEGEND_SIDE_GAP + LEGEND_PADDING_X;
  let y = LEGEND_TOP_GAP + LEGEND_PADDING_Y;
  let rowCount = 1;

  items.forEach(item => {
    const itemWidth = Math.min(item.width, availableWidth - LEGEND_PADDING_X * 2);
    if (x + itemWidth > LEGEND_SIDE_GAP + availableWidth - LEGEND_PADDING_X && x > LEGEND_SIDE_GAP + LEGEND_PADDING_X) {
      x = LEGEND_SIDE_GAP + LEGEND_PADDING_X;
      y += LEGEND_ITEM_HEIGHT + LEGEND_GAP_Y;
      rowCount++;
    }
    item.x = x;
    item.y = y;
    item.w = itemWidth;
    item.h = LEGEND_ITEM_HEIGHT;
    x += itemWidth + LEGEND_GAP_X;
  });

  const height = rowCount * LEGEND_ITEM_HEIGHT + (rowCount - 1) * LEGEND_GAP_Y + LEGEND_PADDING_Y * 2;
  return {
    items,
    box: {
      x: LEGEND_SIDE_GAP,
      y: LEGEND_TOP_GAP,
      w: availableWidth,
      h: height
    }
  };
}

function getContentMetrics(){
  const baseWidth = sourceCanvas.width || viewportWidth || canvas.width || 120;
  const legend = getLegendLayout(baseWidth);
  const legendBottom = legend.items.length
    ? Math.max(...legend.items.map(item => item.y + item.h))
    : legend.box.y;
  const imageY = legendBottom + LEGEND_IMAGE_GAP;
  const contentWidth = sourceCanvas.width || viewportWidth || canvas.width || 1;
  const contentHeight = imageY + (sourceCanvas.height || 0);
  return {
    legend,
    imageX: 0,
    imageY,
    contentWidth,
    contentHeight
  };
}

function resize(){
  relocatePanelsForViewport();
  const rect = canvasWrap.getBoundingClientRect();
  deviceScale = Math.max(1, window.devicePixelRatio || 1);
  viewportWidth = Math.max(1, Math.floor(rect.width));
  viewportHeight = Math.max(1, Math.floor(rect.height));
  canvas.style.width = `${viewportWidth}px`;
  canvas.style.height = `${viewportHeight}px`;
  canvas.width = Math.max(1, Math.floor(viewportWidth * deviceScale));
  canvas.height = Math.max(1, Math.floor(viewportHeight * deviceScale));
  draw();
}
window.addEventListener('resize', resize);

function openFillDb(){
  if (fillDbPromise) return fillDbPromise;

  fillDbPromise = new Promise((resolve, reject) => {
    const request = indexedDB.open(FILL_DB_NAME, 2);
    request.onupgradeneeded = () => {
      const db = request.result;
      if (db.objectStoreNames.contains(FILL_STORE_NAME)) {
        db.deleteObjectStore(FILL_STORE_NAME);
      }
      db.createObjectStore(FILL_STORE_NAME, { keyPath: 'id' });
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error || new Error('打开填色存储失败'));
  });

  return fillDbPromise;
}

async function getSavedFillRecords(){
  const db = await openFillDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(FILL_STORE_NAME, 'readonly');
    const store = tx.objectStore(FILL_STORE_NAME);
    const request = store.getAll();
    request.onsuccess = () => resolve((request.result || []).sort((a, b) => b.savedAt - a.savedAt));
    request.onerror = () => reject(request.error || new Error('读取填色存档失败'));
  });
}

async function saveFillRecord(record){
  const db = await openFillDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(FILL_STORE_NAME, 'readwrite');
    const store = tx.objectStore(FILL_STORE_NAME);
    const request = store.put(record);
    request.onsuccess = () => resolve();
    request.onerror = () => reject(request.error || new Error('保存填色存档失败'));
  });
}

async function getSavedFillRecordById(id){
  const db = await openFillDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(FILL_STORE_NAME, 'readonly');
    const store = tx.objectStore(FILL_STORE_NAME);
    const request = store.get(id);
    request.onsuccess = () => resolve(request.result || null);
    request.onerror = () => reject(request.error || new Error('读取填色记录失败'));
  });
}

async function deleteSavedFillRecord(id){
  const db = await openFillDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(FILL_STORE_NAME, 'readwrite');
    const store = tx.objectStore(FILL_STORE_NAME);
    const request = store.delete(id);
    request.onsuccess = () => resolve();
    request.onerror = () => reject(request.error || new Error('删除填色存档失败'));
  });
}

function canvasToBlob(canvasEl){
  return new Promise((resolve, reject) => {
    canvasEl.toBlob(blob => {
      if (blob) {
        resolve(blob);
      } else {
        reject(new Error('生成填色快照失败'));
      }
    }, 'image/png');
  });
}

function blobToImage(blob){
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(blob);
    const image = new Image();
    image.onload = () => {
      URL.revokeObjectURL(url);
      resolve(image);
    };
    image.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error('读取填色快照失败'));
    };
    image.src = url;
  });
}

function isFillCanvasEmpty(){
  if (!fillCanvas.width || !fillCanvas.height) return true;
  const data = fillCtx.getImageData(0, 0, fillCanvas.width, fillCanvas.height).data;
  for (let i = 3; i < data.length; i += 4) {
    if (data[i] !== 0) return false;
  }
  return true;
}

function formatSavedFillTime(timestamp){
  const date = new Date(timestamp);
  const y = date.getFullYear();
  const m = `${date.getMonth() + 1}`.padStart(2, '0');
  const d = `${date.getDate()}`.padStart(2, '0');
  const hh = `${date.getHours()}`.padStart(2, '0');
  const mm = `${date.getMinutes()}`.padStart(2, '0');
  const ss = `${date.getSeconds()}`.padStart(2, '0');
  return `${y}-${m}-${d} ${hh}:${mm}:${ss}`;
}

function renderSavedFillList(){
  const list = document.getElementById('savedFillList');
  if (!list) return;

  if (!savedFillRecords.length) {
    list.innerHTML = '<div class="saved-fill-empty">暂无保存记录</div>';
    return;
  }

  list.innerHTML = savedFillRecords.map((record, index) => `
    <div class="saved-fill-item" data-fill-restore="${record.id}">
      <div class="saved-fill-meta">
        <div class="saved-fill-title">${record.name || `保存记录 ${savedFillRecords.length - index}`}</div>
        <div class="saved-fill-time">${formatSavedFillTime(record.savedAt)}</div>
      </div>
      <div class="saved-fill-actions">
        <button class="btn" data-fill-action="rename" data-fill-id="${record.id}">改名</button>
        <button class="btn-danger" data-fill-action="delete" data-fill-id="${record.id}">删除</button>
      </div>
    </div>
  `).join('');
}

async function refreshSavedFillState(){
  try {
    savedFillRecords = await getSavedFillRecords();
  } catch {
    savedFillRecords = [];
  }
  renderSavedFillList();
}

function relocatePanelsForViewport(){
  const isMobileLayout = window.matchMedia('(max-width: 640px)').matches;

  if (isMobileLayout) {
    if (paramsPanel.parentElement !== app) {
      app.insertBefore(paramsPanel, mobilePanelsAnchor);
    }
    if (statusPanel.parentElement !== app) {
      app.insertBefore(statusPanel, mobilePanelsAnchor);
    }
  } else {
    if (paramsPanel.parentElement !== sidebar) {
      sidebar.appendChild(paramsPanel);
    }
    if (statusPanel.parentElement !== sidebar) {
      sidebar.appendChild(statusPanel);
    }
  }
}

img.onload = async () => {
  sourceCanvas.width = img.width;
  sourceCanvas.height = img.height;
  sourceCtx.clearRect(0, 0, img.width, img.height);
  sourceCtx.drawImage(img, 0, 0);

  fillCanvas.width = img.width;
  fillCanvas.height = img.height;
  fillCtx.clearRect(0, 0, img.width, img.height);

  sourceImageData = sourceCtx.getImageData(0, 0, img.width, img.height);
  sourcePixels = sourceImageData.data;

  resize();
  fit();
  updateHistoryButtons();
  await refreshSavedFillState();
  await rebuildRegions();
};

function fit(){
  if (!img.width || !img.height || !viewportWidth || !viewportHeight) return;
  const metrics = getContentMetrics();
  const availableWidth = viewportWidth - 24;
  const availableHeight = viewportHeight - 24;
  scale = Math.min(availableWidth / metrics.contentWidth, availableHeight / metrics.contentHeight);
  scale = Math.max(scale, 0.05);
  offsetX = (viewportWidth - metrics.contentWidth * scale) / 2;
  offsetY = (viewportHeight - metrics.contentHeight * scale) / 2;
  draw();
}

function draw(){
  const metrics = getContentMetrics();

  ctx.setTransform(1,0,0,1,0,0);
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.setTransform(deviceScale * scale,0,0,deviceScale * scale,deviceScale * offsetX,deviceScale * offsetY);
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  drawLegend(ctx, metrics.legend);
  ctx.drawImage(fillCanvas, metrics.imageX, metrics.imageY);
  ctx.drawImage(sourceCanvas, metrics.imageX, metrics.imageY);

  if (editing && !isDragging && hoverRegionId >= 0 && hoverBounds) {
    drawHoverOverlay(hoverRegionId, hoverBounds, metrics.imageX, metrics.imageY);
  }

  ctx.strokeStyle = 'rgba(0,0,0,.45)';
  ctx.lineWidth = 1 / (deviceScale * scale);
  ctx.strokeRect(metrics.imageX, metrics.imageY, sourceCanvas.width, sourceCanvas.height);
}

function drawLegend(targetCtx, layout){
  const { items } = layout;

  targetCtx.save();

  items.forEach(item => {
    const swatchX = item.x;
    const swatchY = item.y + (item.h - LEGEND_SWATCH_H) / 2;
    const textX = swatchX + LEGEND_SWATCH_W + LEGEND_TEXT_GAP;
    const textY = item.y + item.h / 2;

    if (item.active) {
      targetCtx.beginPath();
      targetCtx.fillStyle = 'rgba(59,130,246,.12)';
      drawRoundRectWithCtx(targetCtx, item.x - 8, item.y + 2, item.w, item.h - 4, 10);
      targetCtx.fill();

      targetCtx.beginPath();
      targetCtx.strokeStyle = 'rgba(59,130,246,.32)';
      targetCtx.lineWidth = 1.5 / (deviceScale * scale);
      drawRoundRectWithCtx(targetCtx, item.x - 8, item.y + 2, item.w, item.h - 4, 10);
      targetCtx.stroke();
    }

    targetCtx.fillStyle = item.value;
    targetCtx.strokeStyle = item.active ? 'rgba(17,24,39,.22)' : 'rgba(17,24,39,.08)';
    targetCtx.lineWidth = 1 / (deviceScale * scale);
    drawRoundRectWithCtx(targetCtx, swatchX, swatchY, LEGEND_SWATCH_W, LEGEND_SWATCH_H, LEGEND_SWATCH_RADIUS);
    targetCtx.fill();
    targetCtx.stroke();

    targetCtx.fillStyle = item.active ? '#111827' : '#4b5563';
    targetCtx.font = item.active
      ? '700 18px "PingFang SC","Microsoft YaHei",sans-serif'
      : LEGEND_FONT;
    targetCtx.textBaseline = 'middle';
    targetCtx.fillText(item.name, textX, textY);
  });

  targetCtx.restore();
}

function drawRoundRectWithCtx(targetCtx, x, y, w, h, r){
  const radius = Math.min(r, w / 2, h / 2);
  targetCtx.beginPath();
  targetCtx.moveTo(x + radius, y);
  targetCtx.arcTo(x + w, y, x + w, y + h, radius);
  targetCtx.arcTo(x + w, y + h, x, y + h, radius);
  targetCtx.arcTo(x, y + h, x, y, radius);
  targetCtx.arcTo(x, y, x + w, y, radius);
  targetCtx.closePath();
}

function drawHoverOverlay(regionId, bounds, imageX, imageY){
  if (!hoverOverlayCanvas || hoverOverlayRegionId !== regionId) {
    buildHoverOverlay(regionId);
  }
  if (!hoverOverlayCanvas) return;

  ctx.save();
  ctx.setTransform(deviceScale * scale, 0, 0, deviceScale * scale, deviceScale * offsetX, deviceScale * offsetY);
  ctx.drawImage(hoverOverlayCanvas, imageX + bounds.minX, imageY + bounds.minY);
  ctx.restore();
}

function buildHoverOverlay(regionId){
  if (regionId < 0 || !regions[regionId]) {
    hoverOverlayCanvas = null;
    hoverOverlayRegionId = -1;
    return;
  }

  const bounds = regions[regionId];
  const { minX, minY, maxX, maxY } = bounds;
  const width = maxX - minX + 1;
  const height = maxY - minY + 1;

  const temp = document.createElement('canvas');
  temp.width = width;
  temp.height = height;
  const tctx = temp.getContext('2d');

  tctx.fillStyle = 'rgba(59,130,246,0.24)';
  for (let y = minY; y <= maxY; y++) {
    const rowStart = y * sourceCanvas.width;
    for (let x = minX; x <= maxX; x++) {
      if (regionMap[rowStart + x] === regionId) {
        tctx.fillRect(x - minX, y - minY, 1, 1);
      }
    }
  }

  hoverOverlayCanvas = temp;
  hoverOverlayRegionId = regionId;
}

function getCanvasPoint(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  return { x: clientX - rect.left, y: clientY - rect.top };
}

function screenToImage(clientX, clientY){
  const metrics = getContentMetrics();
  const p = getCanvasPoint(clientX, clientY);
  return {
    x: Math.floor((p.x - offsetX) / scale - metrics.imageX),
    y: Math.floor((p.y - offsetY) / scale - metrics.imageY)
  };
}

function inBounds(x, y){
  return x >= 0 && y >= 0 && x < sourceCanvas.width && y < sourceCanvas.height;
}

function getPixelIndex(x, y){
  return (y * sourceCanvas.width + x) * 4;
}

function hexToRgb(hex){
  const n = parseInt(hex.slice(1), 16);
  return [(n >> 16) & 255, (n >> 8) & 255, n & 255];
}

function isBoundaryAt(x, y){
  const i = getPixelIndex(x, y);
  const r = sourcePixels[i];
  const g = sourcePixels[i + 1];
  const b = sourcePixels[i + 2];
  const a = sourcePixels[i + 3];

  const alphaThreshold = Number(document.getElementById('alphaThreshold').value);
  if (a < alphaThreshold) return false;

  const lum = 0.299 * r + 0.587 * g + 0.114 * b;
  const boundaryThreshold = Number(document.getElementById('boundaryThreshold').value);
  return lum < boundaryThreshold;
}

async function rebuildRegions(){
  if (!sourcePixels) return;

  setStatus('正在重新分区，请稍候...');
  clearHover();

  const w = sourceCanvas.width;
  const h = sourceCanvas.height;

  regionMap = new Int32Array(w * h);
  regionMap.fill(-2);
  regions = [];
  undoStack = [];
  redoStack = [];
  fillCtx.clearRect(0, 0, fillCanvas.width, fillCanvas.height);
  updateHistoryButtons();

  let regionId = 0;
  let boundaryCount = 0;
  const startTime = performance.now();

  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const p = y * w + x;
      if (regionMap[p] !== -2) continue;

      if (isBoundaryAt(x, y)) {
        regionMap[p] = -1;
        boundaryCount++;
        continue;
      }

      const region = collectRegionScanline(x, y, regionId);
      if (region.pixelCount > 0) {
        regions.push(region);
        regionId++;
      }
    }

    if (y % 32 === 0) {
      draw();
      await nextFrame();
    }
  }

  const cost = (performance.now() - startTime).toFixed(1);
  clearHover();
  draw();
  updateStats(cost, boundaryCount);
  refreshModeText();
}

function collectRegionScanline(startX, startY, regionId){
  const w = sourceCanvas.width;
  const h = sourceCanvas.height;
  const stack = [[startX, startY]];

  let minX = startX;
  let minY = startY;
  let maxX = startX;
  let maxY = startY;
  let pixelCount = 0;

  while (stack.length) {
    const [sx, sy] = stack.pop();
    if (sy < 0 || sy >= h || sx < 0 || sx >= w) continue;

    let x = sx;
    const rowIndex = sy * w;

    while (x >= 0) {
      const idx = rowIndex + x;
      if (regionMap[idx] !== -2) break;
      if (isBoundaryAt(x, sy)) {
        regionMap[idx] = -1;
        break;
      }
      x--;
    }
    const left = x + 1;

    x = sx;
    while (x < w) {
      const idx = rowIndex + x;
      if (regionMap[idx] !== -2) break;
      if (isBoundaryAt(x, sy)) {
        regionMap[idx] = -1;
        break;
      }
      x++;
    }
    const right = x - 1;

    if (right < left) continue;

    for (let px = left; px <= right; px++) {
      regionMap[rowIndex + px] = regionId;
      pixelCount++;
    }

    if (left < minX) minX = left;
    if (right > maxX) maxX = right;
    if (sy < minY) minY = sy;
    if (sy > maxY) maxY = sy;

    for (const ny of [sy - 1, sy + 1]) {
      if (ny < 0 || ny >= h) continue;

      let inRun = false;
      const nRow = ny * w;

      for (let px = left; px <= right; px++) {
        const idx = nRow + px;
        if (regionMap[idx] === -2 && !isBoundaryAt(px, ny)) {
          if (!inRun) {
            stack.push([px, ny]);
            inRun = true;
          }
        } else {
          if (regionMap[idx] === -2 && isBoundaryAt(px, ny)) {
            regionMap[idx] = -1;
          }
          inRun = false;
        }
      }
    }
  }

  return { minX, minY, maxX, maxY, pixelCount };
}

function nextFrame(){
  return new Promise(resolve => requestAnimationFrame(resolve));
}

function updateHoverByPoint(x, y){
  if (!editing || !regionMap || !inBounds(x, y) || pointerActive || isDragging || pinchActive) {
    if (hoverRegionId !== -1) {
      clearHover();
      draw();
    }
    return;
  }

  const id = regionMap[y * sourceCanvas.width + x];
  if (id < 0 || !regions[id]) {
    if (hoverRegionId !== -1) {
      clearHover();
      draw();
    }
    return;
  }

  if (hoverRegionId === id) return;

  hoverRegionId = id;
  hoverBounds = regions[id];
  buildHoverOverlay(id);
  draw();
}

function clearHover(){
  hoverRegionId = -1;
  hoverBounds = null;
  hoverOverlayCanvas = null;
  hoverOverlayRegionId = -1;
}

function fillRegion(regionId, fillHex){
  if (regionId < 0 || !regions[regionId]) return;

  const region = regions[regionId];
  const { minX, minY, maxX, maxY } = region;
  const width = maxX - minX + 1;
  const height = maxY - minY + 1;

  const before = fillCtx.getImageData(minX, minY, width, height);
  const patch = fillCtx.getImageData(minX, minY, width, height);
  const data = patch.data;
  const fillRgb = hexToRgb(fillHex);

  let changed = false;

  for (let y = minY; y <= maxY; y++) {
    const rowStart = y * sourceCanvas.width;
    for (let x = minX; x <= maxX; x++) {
      if (regionMap[rowStart + x] !== regionId) continue;

      const local = ((y - minY) * width + (x - minX)) * 4;
      const r = data[local];
      const g = data[local + 1];
      const b = data[local + 2];
      const a = data[local + 3];

      if (r === fillRgb[0] && g === fillRgb[1] && b === fillRgb[2] && a === 255) {
        continue;
      }

      data[local] = fillRgb[0];
      data[local + 1] = fillRgb[1];
      data[local + 2] = fillRgb[2];
      data[local + 3] = 255;
      changed = true;
    }
  }

  if (!changed) return;

  fillCtx.putImageData(patch, minX, minY);
  undoStack.push({ x: minX, y: minY, imageData: before });
  if (undoStack.length > HISTORY_LIMIT) undoStack.shift();
  redoStack = [];
  updateHistoryButtons();
  draw();
}

function resetFill(){
  const before = fillCtx.getImageData(0, 0, fillCanvas.width, fillCanvas.height);
  fillCtx.clearRect(0, 0, fillCanvas.width, fillCanvas.height);

  undoStack.push({ x: 0, y: 0, imageData: before });
  if (undoStack.length > HISTORY_LIMIT) undoStack.shift();
  redoStack = [];
  updateHistoryButtons();

  clearHover();
  draw();
}

function clearCurrentFillState(){
  fillCtx.clearRect(0, 0, fillCanvas.width, fillCanvas.height);
  undoStack = [];
  redoStack = [];
  updateHistoryButtons();
  clearHover();
  draw();
}

async function saveCurrentFill(){
  if (!fillCanvas.width || !fillCanvas.height || isFillCanvasEmpty()) {
    setStatus('当前没有可保存的填色内容');
    return;
  }

  try {
    const blob = await canvasToBlob(fillCanvas);
    const savedAt = Date.now();
    await saveFillRecord({
      id: `fill-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
      name: `保存记录 ${savedFillRecords.length + 1}`,
      width: fillCanvas.width,
      height: fillCanvas.height,
      blob,
      savedAt
    });
    await refreshSavedFillState();
    setStatus('填色内容已保存到列表');
  } catch (error) {
    setStatus(error?.message || '保存填色内容失败');
  }
}

async function renameSavedFill(id){
  try {
    const record = await getSavedFillRecordById(id);
    if (!record) {
      await refreshSavedFillState();
      setStatus('该保存记录不存在');
      return;
    }

    const nextName = window.prompt('请输入新的保存名称', record.name || '');
    if (nextName === null) return;

    const trimmedName = nextName.trim();
    if (!trimmedName) {
      setStatus('名称不能为空');
      return;
    }

    await saveFillRecord({
      ...record,
      name: trimmedName
    });
    await refreshSavedFillState();
    setStatus('保存记录已重命名');
  } catch (error) {
    setStatus(error?.message || '重命名保存记录失败');
  }
}

async function restoreSavedFill(id){
  try {
    const record = await getSavedFillRecordById(id);
    if (!record || !record.blob) {
      await refreshSavedFillState();
      setStatus('该保存记录不存在');
      return;
    }

    if (record.width !== fillCanvas.width || record.height !== fillCanvas.height) {
      setStatus('保存的填色尺寸与当前图片不一致，无法恢复');
      return;
    }

    const image = await blobToImage(record.blob);
    fillCtx.clearRect(0, 0, fillCanvas.width, fillCanvas.height);
    fillCtx.drawImage(image, 0, 0);
    undoStack = [];
    redoStack = [];
    updateHistoryButtons();
    clearHover();
    draw();
    setStatus('已恢复保存的填色内容');
  } catch (error) {
    setStatus(error?.message || '恢复填色内容失败');
  }
}

async function deleteSavedFill(id){
  try {
    await deleteSavedFillRecord(id);
    await refreshSavedFillState();
    setStatus('已删除保存记录');
  } catch (error) {
    setStatus(error?.message || '删除保存记录失败');
  }
}

function undo(){
  if (!undoStack.length) return;
  const op = undoStack.pop();
  const current = fillCtx.getImageData(op.x, op.y, op.imageData.width, op.imageData.height);
  redoStack.push({ x: op.x, y: op.y, imageData: current });
  fillCtx.putImageData(op.imageData, op.x, op.y);
  updateHistoryButtons();
  draw();
}

function redo(){
  if (!redoStack.length) return;
  const op = redoStack.pop();
  const current = fillCtx.getImageData(op.x, op.y, op.imageData.width, op.imageData.height);
  undoStack.push({ x: op.x, y: op.y, imageData: current });
  fillCtx.putImageData(op.imageData, op.x, op.y);
  updateHistoryButtons();
  draw();
}

function updateHistoryButtons(){
  document.getElementById('undoBtn').disabled = undoStack.length === 0;
  document.getElementById('redoBtn').disabled = redoStack.length === 0;
}

function updateStats(costMs, boundaryCount){
  document.getElementById('stats').innerHTML = `
    图像尺寸：${sourceCanvas.width} × ${sourceCanvas.height}<br>
    识别区域数：${regions.length}<br>
    边界/不可填充像素：${boundaryCount}<br>
    总像素：${sourceCanvas.width * sourceCanvas.height}<br>
    分区耗时：${costMs} ms
  `;
}

function setStatus(text){
  document.getElementById('statusText').textContent = text;
}

function refreshModeText(){
  setStatus(
    editing
      ? '当前模式：编辑 / 轻点填色 / 拖动平移 / 双指或滚轮缩放'
      : '当前模式：浏览 / 拖拽查看 / 双指或滚轮缩放'
  );
}

function getDistance(p1, p2){
  const dx = p1.clientX - p2.clientX;
  const dy = p1.clientY - p2.clientY;
  return Math.hypot(dx, dy);
}

function getMidpoint(p1, p2){
  return {
    clientX: (p1.clientX + p2.clientX) / 2,
    clientY: (p1.clientY + p2.clientY) / 2
  };
}

function zoomAt(clientX, clientY, zoomFactor){
  const p = getCanvasPoint(clientX, clientY);
  const imgX = (p.x - offsetX) / scale;
  const imgY = (p.y - offsetY) / scale;
  const newScale = Math.max(minScale, Math.min(maxScale, scale * zoomFactor));
  offsetX = p.x - imgX * newScale;
  offsetY = p.y - imgY * newScale;
  scale = newScale;
  draw();
}

function beginPointer(e){
  activePointers.set(e.pointerId, { clientX: e.clientX, clientY: e.clientY });

  if (activePointers.size === 2) {
    const [p1, p2] = [...activePointers.values()];
    pinchActive = true;
    pinchDistance = getDistance(p1, p2);
    pinchMidpoint = getMidpoint(p1, p2);
    clearHover();
    draw();
    return;
  }

  if (pinchActive) return;

  pointerActive = true;
  pointerId = e.pointerId;
  downClientX = e.clientX;
  downClientY = e.clientY;
  lastClientX = e.clientX;
  lastClientY = e.clientY;
  moved = false;
  isDragging = false;

  clearHover();
  canvas.classList.add('dragging');
  canvas.setPointerCapture(e.pointerId);
  draw();
}

function movePointer(e){
  if (activePointers.has(e.pointerId)) {
    activePointers.set(e.pointerId, { clientX: e.clientX, clientY: e.clientY });
  }

  if (activePointers.size === 2) {
    const [p1, p2] = [...activePointers.values()];
    const nextDistance = getDistance(p1, p2);
    const nextMidpoint = getMidpoint(p1, p2);

    if (!pinchActive) {
      pinchActive = true;
      pinchDistance = nextDistance;
      pinchMidpoint = nextMidpoint;
      return;
    }

    const zoomFactor = nextDistance / pinchDistance;
    if (Number.isFinite(zoomFactor) && zoomFactor > 0) {
      zoomAt(nextMidpoint.clientX, nextMidpoint.clientY, zoomFactor);
    }

    const prevCanvasPoint = getCanvasPoint(pinchMidpoint.clientX, pinchMidpoint.clientY);
    const nextCanvasPoint = getCanvasPoint(nextMidpoint.clientX, nextMidpoint.clientY);
    offsetX += nextCanvasPoint.x - prevCanvasPoint.x;
    offsetY += nextCanvasPoint.y - prevCanvasPoint.y;

    pinchDistance = nextDistance;
    pinchMidpoint = nextMidpoint;
    draw();
    return;
  }

  if (!pointerActive || e.pointerId !== pointerId) return;

  const dxTotal = e.clientX - downClientX;
  const dyTotal = e.clientY - downClientY;
  const dx = e.clientX - lastClientX;
  const dy = e.clientY - lastClientY;

  if (Math.abs(dxTotal) > DRAG_THRESHOLD || Math.abs(dyTotal) > DRAG_THRESHOLD) {
    moved = true;
  }

  const shouldDrag = (!editing) || moved;
  if (shouldDrag) {
    isDragging = true;
    offsetX += dx;
    offsetY += dy;
    draw();
  }

  lastClientX = e.clientX;
  lastClientY = e.clientY;
}

function endPointer(e){
  activePointers.delete(e.pointerId);

  if (pinchActive) {
    if (activePointers.size < 2) {
      pinchActive = false;
      pinchDistance = 0;
      pinchMidpoint = null;
    }
    if (e.pointerId === pointerId) {
      pointerActive = false;
      pointerId = null;
      isDragging = false;
      moved = false;
      canvas.classList.remove('dragging');
    }
    draw();
    return;
  }

  if (!pointerActive || e.pointerId !== pointerId) return;

  const wasDragging = isDragging;
  const upX = e.clientX;
  const upY = e.clientY;

  canvas.classList.remove('dragging');
  try { canvas.releasePointerCapture(e.pointerId); } catch {}

  pointerActive = false;
  pointerId = null;
  isDragging = false;

  if (editing && !moved && !wasDragging) {
    const p = screenToImage(upX, upY);
    if (inBounds(p.x, p.y) && regionMap) {
      const id = regionMap[p.y * sourceCanvas.width + p.x];
      if (id >= 0) {
        fillRegion(id, colors[selected].value);
        hoverRegionId = id;
        hoverBounds = regions[id];
        buildHoverOverlay(id);
        draw();
      }
    }
  } else {
    draw();
  }

  moved = false;
}

function cancelPointer(e){
  activePointers.delete(e.pointerId);
  canvas.classList.remove('dragging');
  try { canvas.releasePointerCapture(e.pointerId); } catch {}
  if (e.pointerId === pointerId) {
    pointerActive = false;
    pointerId = null;
  }
  if (activePointers.size < 2) {
    pinchActive = false;
    pinchDistance = 0;
    pinchMidpoint = null;
  }
  moved = false;
  isDragging = false;
  clearHover();
  draw();
}

canvas.addEventListener('contextmenu', (e) => e.preventDefault());
canvas.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  beginPointer(e);
});
canvas.addEventListener('pointermove', (e) => {
  hoverClientX = e.clientX;
  hoverClientY = e.clientY;

  if (pointerActive || activePointers.size >= 2) {
    movePointer(e);
    return;
  }

  if (editing && !hoverPending) {
    hoverPending = true;
    requestAnimationFrame(() => {
      hoverPending = false;
      const p = screenToImage(hoverClientX, hoverClientY);
      updateHoverByPoint(p.x, p.y);
    });
  }
});
canvas.addEventListener('pointerup', (e) => {
  e.preventDefault();
  endPointer(e);
});
canvas.addEventListener('pointercancel', cancelPointer);
canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  zoomAt(e.clientX, e.clientY, e.deltaY < 0 ? 1.1 : 0.9);
}, { passive:false });

const editToggle = document.getElementById('editToggle');
const thresholdSlider = document.getElementById('boundaryThreshold');
const thresholdText = document.getElementById('thresholdText');
const alphaSlider = document.getElementById('alphaThreshold');
const alphaText = document.getElementById('alphaText');
const colorBox = document.getElementById('colorBox');
const colorPicker = document.getElementById('colorPicker');
const exportBtn = document.getElementById('exportBtn');
const saveFillBtn = document.getElementById('saveFillBtn');
const savedFillList = document.getElementById('savedFillList');

editToggle.onclick = () => {
  editing = !editing;
  editToggle.classList.toggle('active', editing);
  editToggle.textContent = editing ? '退出编辑' : '进入编辑';
  canvas.classList.toggle('editing', editing);
  clearHover();
  refreshModeText();
  draw();
};

thresholdSlider.addEventListener('input', () => {
  thresholdText.textContent = thresholdSlider.value;
});
alphaSlider.addEventListener('input', () => {
  alphaText.textContent = alphaSlider.value;
});

document.getElementById('fitBtn').onclick = fit;
document.getElementById('resetBtn').onclick = resetFill;
document.getElementById('undoBtn').onclick = undo;
document.getElementById('redoBtn').onclick = redo;
document.getElementById('rebuildBtn').onclick = rebuildRegions;
exportBtn.onclick = exportImage;
saveFillBtn.onclick = saveCurrentFill;

savedFillList.addEventListener('click', (e) => {
  const target = e.target.closest('button[data-fill-action]');
  if (target) {
    const id = target.dataset.fillId;
    const action = target.dataset.fillAction;

    if (action === 'rename') {
      renameSavedFill(id);
    } else if (action === 'delete') {
      deleteSavedFill(id);
    }
    return;
  }

  const item = e.target.closest('[data-fill-restore]');
  if (item) {
    restoreSavedFill(item.dataset.fillRestore);
  }
});

document.addEventListener('keydown', (e) => {
  const key = e.key.toLowerCase();
  if ((e.ctrlKey || e.metaKey) && !e.shiftKey && key === 'z') {
    e.preventDefault();
    undo();
  } else if (((e.ctrlKey || e.metaKey) && key === 'y') || ((e.ctrlKey || e.metaKey) && e.shiftKey && key === 'z')) {
    e.preventDefault();
    redo();
  }
});

colorPicker.addEventListener('input', () => {
  const val = colorPicker.value;
  colors[selected].value = val;
  savePalette();
  syncColorInputs();
  draw();
});

document.getElementById('addColor').onclick = () => {
  const value = colorPicker.value;
  const name = document.getElementById('nameInput').value.trim() || `颜色${colors.length + 1}`;
  colors.push({ name, value });
  selected = colors.length - 1;
  savePalette();
  syncColorInputs();
  draw();
};

document.getElementById('rename').onclick = () => {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  colors[selected].name = name;
  savePalette();
  syncColorInputs();
  draw();
};

document.getElementById('delete').onclick = () => {
  if (colors.length <= 1) return;
  colors.splice(selected, 1);
  selected = Math.max(0, Math.min(selected, colors.length - 1));
  savePalette();
  syncColorInputs();
  draw();
};

function syncColorInputs(){
  if (colors[selected]) {
    document.getElementById('nameInput').value = colors[selected].name;
    colorPicker.value = colors[selected].value;
    colorBox.style.background = colors[selected].value;
  }
}

function hitLegendItem(clientX, clientY){
  const p = getCanvasPoint(clientX, clientY);
  const contentX = (p.x - offsetX) / scale;
  const contentY = (p.y - offsetY) / scale;
  const layout = getContentMetrics().legend;
  return layout.items.find(item => contentX >= item.x && contentX <= item.x + item.w && contentY >= item.y && contentY <= item.y + item.h) || null;
}

function exportImage(){
  const metrics = getContentMetrics();
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = Math.max(1, Math.floor(viewportWidth * deviceScale));
  exportCanvas.height = Math.max(1, Math.floor(viewportHeight * deviceScale));
  const exportCtx = exportCanvas.getContext('2d');

  exportCtx.fillStyle = '#ffffff';
  exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);

  exportCtx.setTransform(deviceScale * scale,0,0,deviceScale * scale,deviceScale * offsetX,deviceScale * offsetY);
  exportCtx.imageSmoothingEnabled = true;
  exportCtx.imageSmoothingQuality = 'high';
  drawLegend(exportCtx, metrics.legend);
  exportCtx.drawImage(fillCanvas, metrics.imageX, metrics.imageY);
  exportCtx.drawImage(sourceCanvas, metrics.imageX, metrics.imageY);
  exportCtx.strokeStyle = 'rgba(0,0,0,.45)';
  exportCtx.lineWidth = 1 / (deviceScale * scale);
  exportCtx.strokeRect(metrics.imageX, metrics.imageY, sourceCanvas.width, sourceCanvas.height);

  const link = document.createElement('a');
  link.href = exportCanvas.toDataURL('image/png');
  link.download = `区域填色图-${Date.now()}.png`;
  link.click();
}

function savePalette(){
  localStorage.setItem(PALETTE_KEY, JSON.stringify({ colors, selected }));
}

function loadPalette(){
  try {
    const raw = localStorage.getItem(PALETTE_KEY);
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    if (!parsed || !Array.isArray(parsed.colors) || !parsed.colors.length) return null;
    return { colors: parsed.colors, selected: parsed.selected ?? 0 };
  } catch {
    return null;
  }
}

syncColorInputs();

canvas.addEventListener('click', (e) => {
  const legendItem = hitLegendItem(e.clientX, e.clientY);
  if (!legendItem) return;
  selected = legendItem.index;
  savePalette();
  syncColorInputs();
  draw();
});
</script>
</body>
</html>
